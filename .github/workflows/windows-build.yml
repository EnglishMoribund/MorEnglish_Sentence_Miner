name: windows-build

# Builds the Windows NSIS installer and attaches it to the GitHub release.
# Runs on every version tag; workflow_dispatch lets us (re)build for an
# existing tag.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to attach the installer to"
        required: true

jobs:
  windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        run: npm install

      - name: Build NSIS installer
        run: npm run build -- --bundles nsis

      - name: Upload installer to the release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "${{ steps.tag.outputs.tag }}" \
            src-tauri/target/release/bundle/nsis/*.exe --clobber
